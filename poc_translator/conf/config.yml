  omop_schema: "omop"
  cohort_tables:
    mimic: "mimiciv_bsi_100_2h_test.__mimiciv_bsi_100_2h_cohort"
    eicu: "eicu_bsi_100_2h_test.__eicu_bsi_100_2h_cohort"

paths:
  eicu_poc_csv: "/bigdata/omerg/Thesis/EHR_Translator/poc_translator/eicu_poc_features.csv"
  mimic_poc_csv: "/bigdata/omerg/Thesis/EHR_Translator/poc_translator/mimic_poc_features.csv"
  output_dir: "/bigdata/omerg/Thesis/EHR_Translator/poc_translator"
  tmp_sql_dir: "/bigdata/omerg/Thesis/EHR_Translator/poc_translator/sql"
  analyze_features_path: "/bigdata/omerg/RatchetEHR/analyze_features.py"

# IMPROVED TRAINING CONFIGURATION - Addresses LLM analysis recommendations
# ✅ Per-dataset normalization (fixes feature 32 outlier issue)
# ✅ Multi-kernel MMD (adaptive bandwidth) 
# ✅ Per-feature loss weighting (prevents feature domination)
# ✅ Feature reconstruction head (prevents mode collapse)
# ✅ Adversarial domain classifier (domain-invariant features)
# ✅ Comprehensive evaluation (per-feature metrics)
training:
  epochs: 10   # VALIDATION: Short test run to verify fixes
  batch_size: 128  # REVERTED: Back to stable batch size
  lr: 1e-6  # EMERGENCY: Back to ultra-conservative LR for stability
  latent_dim: 64
  
  # CRITICAL: Much more conservative weights for numerical stability
  kl_weight: 1e-3  # Keep low for stability
  cycle_weight: 0.3  # REBALANCED: Increased for better cycle consistency
  rec_weight: 1.0   # PRIMARY: Focus on reconstruction first
  mmd_weight: 0.5   # REBALANCED: Increased for proper distribution matching
  
  # EMERGENCY: Disable heteroscedastic again - still causing instability
  use_heteroscedastic: false  # DISABLE - persistent explosion even with fixes  
  use_safe_mode: false  # Keep safety systems but don't restrict
  cov_weight: 0.01   # REDUCED: Prevent covariance loss from dominating (was causing 50-60% of total loss)
  per_feature_mmd_weight: 0.2  # REBALANCED: Increased for per-feature distribution matching
  wasserstein_weight: 0.1  # REBALANCED: Increased for stronger distributional alignment
  
  # REBALANCED: Moderate weights for additional loss components
  feature_recon_weight: 0.2  # REBALANCED: Increased to prevent mode collapse
  domain_adversarial_weight: 0.2   # INCREASED: Give domain classifier more influence to break ln(2) stagnation
  
  # Identify problematic features for special handling
  worst_features: ["Temp_mean", "Temp_std", "HR_std", "SpO2_std", "Age", "Creat_mean"]
  
  # Gradient clipping for numerical stability
  gradient_clip_val: 1.0  # Clip gradients to prevent explosion
  
  kl_warmup_epochs: 20  # Increased warmup for more stable training
  early_stop_patience: 15  # Slightly reduced patience
  weight_decay: 1e-4  # Regularization

# OPTIMIZED GPU Configuration for Speed
gpu:
  # GPU device to use (0, 1, 2, 3 for your Tesla V100s, or 'auto' for automatic selection)
  device: 0
  # Enable mixed precision training for faster training and lower memory usage
  precision: "16-mixed"
  # Enable optimized attention for V100 (if using transformer-based components)
  enable_flash_attention: false
  # OPTIMIZED: More workers for faster data loading on multi-core system
  num_workers: 8

downstream:
  xgboost_params:
    n_estimators: 200
    max_depth: 6
    learning_rate: 0.05

logging:
  use_wandb: false
  project: "poc_translator_optimized"
  log_every_n_steps: 50  # OPTIMIZED: Less frequent logging for speed

# SIMPLIFIED: Train/Test only (no validation)
data:
  train_split: 0.8
  test_split: 0.2
  random_seed: 42
