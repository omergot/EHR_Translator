db:
  mimic_conn: "postgresql://postgres:postgres@localhost:5432/mimic"
  eicu_conn: "postgresql://postgres:postgres@localhost:5432/mimic"
  omop_schema: "omop"
  cohort_tables:
    mimic: "mimiciv_bsi_100_2h_test.__mimiciv_bsi_100_2h_cohort"
    eicu: "eicu_bsi_100_2h_test.__eicu_bsi_100_2h_cohort"

paths:
  eicu_poc_csv: "/bigdata/omerg/Thesis/EHR_Translator/poc_translator/eicu_poc_features.csv"
  mimic_poc_csv: "/bigdata/omerg/Thesis/EHR_Translator/poc_translator/mimic_poc_features.csv"
  output_dir: "/bigdata/omerg/Thesis/EHR_Translator/poc_translator"
  tmp_sql_dir: "/bigdata/omerg/Thesis/EHR_Translator/poc_translator/sql"
  analyze_features_path: "/bigdata/omerg/RatchetEHR/analyze_features.py"

# SIMPLIFIED TRAINING CONFIGURATION
# Three core losses: reconstruction, cycle, conditional Wasserstein
# Missing flags and demographics are input-only (no loss)
# Worst features identified dynamically
training:
  epochs: 30   # Short test run to verify simplified model
  batch_size: 128
  
  lr: 1e-3
  
  # Architecture control
  latent_dim_auto: true           # Auto-select latent_dim based on input size (<100: 16, >=100: 32)
  latent_dim: 256                 # Used only if latent_dim_auto: false
  use_residual_blocks: false      # Enable residual blocks for medium arch (>=100 features)
  dropout_rate: 0.1               # Dropout rate for residual blocks (if enabled)
  
  # SIMPLIFIED: Only three loss weights
  rec_weight: 0.2           # Reconstruction loss on clinical features
  cycle_weight: 0.2         # Cycle consistency on clinical features
  wasserstein_weight: 1   # Conditional Wasserstein on worst-K features
  
  # Conditional Wasserstein parameters
  wasserstein_compute_every_n_steps: 1        # Compute every N steps to save compute
  wasserstein_min_group_size: 32              # Minimum samples per demographic group
  wasserstein_worst_k: 5                     # Number of worst features to target
  wasserstein_age_bucket_years: 10            # Age bucket size (e.g., 10-year intervals)
  wasserstein_update_worst_every_n_epochs: 1  # Update worst features every N epochs
  
  # Gradient clipping for numerical stability
  gradient_clip_val: 10.0
  
  # Other parameters
  kl_warmup_epochs: 20  # Not used but kept for compatibility
  early_stop_patience: 15
  weight_decay: 1e-4

# OPTIMIZED GPU Configuration for Speed
gpu:
  # GPU device to use (0, 1, 2, 3 for your Tesla V100s, or 'auto' for automatic selection)
  device: 0
  # Enable mixed precision training for faster training and lower memory usage
  precision: "16-mixed"
  # Enable optimized attention for V100 (if using transformer-based components)
  enable_flash_attention: false
  # OPTIMIZED: More workers for faster data loading on multi-core system
  num_workers: 8

downstream:
  xgboost_params:
    n_estimators: 200
    max_depth: 6
    learning_rate: 0.05

logging:
  use_wandb: false
  project: "poc_translator_optimized"
  log_every_n_steps: 50  # OPTIMIZED: Less frequent logging for speed

# Data splits: Train/Val/Test
data:
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15
  random_seed: 42

# Preprocessing configuration
preprocessing:
  # Maximum percentage of missing values allowed for a feature (0.0 to 1.0)
  # Features with more missing values will be removed
  max_missing_pct: 0.5  # Remove features with >50% missing values
