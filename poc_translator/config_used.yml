balance_strategy: oversample_minority
data:
  random_seed: 42
  test_split: 0.15
  train_split: 0.7
  val_split: 0.15
db:
  cohort_tables:
    eicu: eicu_bsi_100_2h_test.__eicu_bsi_100_2h_cohort
    mimic: mimiciv_bsi_100_2h_test.__mimiciv_bsi_100_2h_cohort
  eicu_conn: postgresql://postgres:postgres@localhost:5432/mimic
  mimic_conn: postgresql://postgres:postgres@localhost:5432/mimic
  omop_schema: omop
downstream:
  xgboost_params:
    learning_rate: 0.05
    max_depth: 6
    n_estimators: 200
gpu:
  device: 0
  enable_flash_attention: false
  num_workers: 4
  precision: 16-mixed
logging:
  log_every_n_steps: 25
  project: poc_translator_fixed
  use_wandb: false
paths:
  analyze_features_path: /bigdata/omerg/RatchetEHR/analyze_features.py
  eicu_poc_csv: /bigdata/omerg/Thesis/poc_translator/eicu_poc_features.csv
  mimic_poc_csv: /bigdata/omerg/Thesis/poc_translator/mimic_poc_features.csv
  output_dir: /bigdata/omerg/Thesis/poc_translator
  tmp_sql_dir: /bigdata/omerg/Thesis/poc_translator/sql
training:
  batch_size: 128
  cycle_weight: 2.0
  early_stop_patience: 20
  epochs: 150
  kl_warmup_epochs: 15
  kl_weight: 1e-2
  latent_dim: 64
  lr: 2e-4
  mmd_weight: 0.5
  rec_weight: 1.0
  weight_decay: 1e-4
