balance_strategy: oversample_minority
data:
  random_seed: 42
  test_split: 0.15
  train_split: 0.7
  val_split: 0.15
db:
  cohort_tables:
    eicu: eicu_bsi_100_2h_test.__eicu_bsi_100_2h_cohort
    mimic: mimiciv_bsi_100_2h_test.__mimiciv_bsi_100_2h_cohort
  eicu_conn: postgresql://postgres:postgres@localhost:5432/mimic
  mimic_conn: postgresql://postgres:postgres@localhost:5432/mimic
  omop_schema: omop
downstream:
  xgboost_params:
    learning_rate: 0.05
    max_depth: 6
    n_estimators: 200
gpu:
  device: 0
  enable_flash_attention: false
  num_workers: 8
  precision: 16-mixed
gpu_device: 0
logging:
  log_every_n_steps: 50
  project: poc_translator_optimized
  use_wandb: false
mimic_only: false
paths:
  analyze_features_path: /bigdata/omerg/RatchetEHR/analyze_features.py
  eicu_poc_csv: /bigdata/omerg/Thesis/EHR_Translator/poc_translator/eicu_poc_features.csv
  mimic_poc_csv: /bigdata/omerg/Thesis/EHR_Translator/poc_translator/mimic_poc_features.csv
  output_dir: /bigdata/omerg/Thesis/EHR_Translator/poc_translator
  tmp_sql_dir: /bigdata/omerg/Thesis/EHR_Translator/poc_translator/sql
preprocessing:
  max_missing_pct: 0.5
training:
  batch_size: 128
  cycle_weight: 0.2
  dropout_rate: 0.1
  early_stop_patience: 15
  epochs: 30
  gradient_clip_val: 10.0
  kl_warmup_epochs: 20
  latent_dim: 256
  latent_dim_auto: true
  lr: 1e-3
  rec_weight: 0.2
  use_residual_blocks: false
  wasserstein_age_bucket_years: 10
  wasserstein_compute_every_n_steps: 1
  wasserstein_min_group_size: 32
  wasserstein_update_worst_every_n_epochs: 1
  wasserstein_weight: 1
  wasserstein_worst_k: 5
  weight_decay: 1e-4
