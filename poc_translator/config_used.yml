balance_strategy: oversample_minority
data:
  random_seed: 42
  test_split: 0.2
  train_split: 0.8
db:
  cohort_tables:
    eicu: eicu_bsi_100_2h_test.__eicu_bsi_100_2h_cohort
    mimic: mimiciv_bsi_100_2h_test.__mimiciv_bsi_100_2h_cohort
  eicu_conn: postgresql://postgres:postgres@localhost:5432/mimic
  mimic_conn: postgresql://postgres:postgres@localhost:5432/mimic
  omop_schema: omop
downstream:
  xgboost_params:
    learning_rate: 0.05
    max_depth: 6
    n_estimators: 200
gpu:
  device: 0
  enable_flash_attention: false
  num_workers: 8
  precision: 16-mixed
gpu_device: 0
logging:
  log_every_n_steps: 50
  project: poc_translator_optimized
  use_wandb: false
paths:
  analyze_features_path: /bigdata/omerg/RatchetEHR/analyze_features.py
  eicu_poc_csv: /bigdata/omerg/Thesis/EHR_Translator/poc_translator/eicu_poc_features.csv
  mimic_poc_csv: /bigdata/omerg/Thesis/EHR_Translator/poc_translator/mimic_poc_features.csv
  output_dir: /bigdata/omerg/Thesis/EHR_Translator/poc_translator
  tmp_sql_dir: /bigdata/omerg/Thesis/EHR_Translator/poc_translator/sql
training:
  batch_size: 128
  cov_weight: 0.1
  cycle_weight: 0.1
  domain_adversarial_weight: 0.01
  early_stop_patience: 15
  epochs: 50
  feature_recon_weight: 0.1
  gradient_clip_val: 1.0
  kl_warmup_epochs: 20
  kl_weight: 1e-3
  latent_dim: 64
  lr: 1e-6
  mmd_weight: 0.1
  per_feature_mmd_weight: 0.05
  rec_weight: 1.0
  use_heteroscedastic: false
  use_safe_mode: false
  wasserstein_weight: 0.05
  weight_decay: 1e-4
  worst_features:
  - Temp_mean
  - Temp_std
  - HR_std
  - SpO2_std
  - Age
  - Creat_mean
